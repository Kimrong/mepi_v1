<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 체육 선생님 - 스마트 스쿼트</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: #2c3e50; padding: 1rem; display: flex; justify-content: center; gap: 20px; }
        nav button { background: none; border: 1px solid white; color: white; padding: 8px 16px; cursor: pointer; border-radius: 5px; }
        nav button:hover { background: white; color: #2c3e50; }
        
        /* 섹션 제어 */
        section { display: none; padding: 20px; text-align: center; }
        section.active { display: block; }

        /* 카메라 컨테이너 (공용) */
        .canvas-wrapper { position: relative; width: 640px; height: 480px; margin: 0 auto; background: #000; border-radius: 10px; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
        
        /* 알림 메시지 스타일 */
        .feedback-text { font-size: 1.5rem; font-weight: bold; color: #e74c3c; margin: 15px; min-height: 2rem; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showSection('ready')">1. 준비 및 인식</button>
        <button onclick="showSection('practice')">2. 스쿼트 연습</button>
        <button onclick="showSection('test')">3. 실전 시험</button>
        <button onclick="showSection('leaderboard')">4. 리더보드</button>
    </nav>

    <section id="ready" class="active">
        <h2>📷 카메라 및 전신 인식 확인</h2>
        <p>전신이 화면에 들어오는지 확인하세요.</p>
        <div class="canvas-wrapper"><video class="input_video"></video><canvas class="output_canvas"></canvas></div>
    </section>

    <section id="practice">
        <h2>🏋️ 스쿼트 연습 모드</h2>
        <div class="feedback-text" id="practice-feedback">자세를 잡아주세요</div>
        <div class="canvas-wrapper"><video class="input_video"></video><canvas class="output_canvas"></canvas></div>
        <div style="margin-top: 10px;">
            <span style="font-size: 2rem;">개수: <span id="count-val">0</span>회</span>
            <button onclick="resetCount()" style="margin-left: 20px;">초기화</button>
        </div>
    </section>

    <section id="test">
        <h2>⏱️ 실전! 60초 측정</h2>
        <div id="test-timer" style="font-size: 2rem; color: #e67e22;">남은 시간: 60초</div>
        <div class="canvas-wrapper"><video class="input_video"></video><canvas class="output_canvas"></canvas></div>
        <div id="score-input-form" style="margin-top: 15px; display: none;">
            <input type="text" placeholder="이름">
            <input type="number" placeholder="학년">
            <button>점수 등록</button>
        </div>
    </section>

    <section id="leaderboard">
        <h2>🏆 우리 학교 랭킹</h2>
        <table style="width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse;">
            <thead><tr style="border-bottom: 2px solid #ddd;"><th>순위</th><th>이름</th><th>학년/반</th><th>점수</th></tr></thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4">데이터를 불러오는 중...</td></tr>
            </tbody>
        </table>
    </section>

    <script type="module">
        // 화면 전환 함수
        window.showSection = function(sectionId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            // 섹션이 바뀔 때마다 필요한 초기화 로직을 여기에 추가할 수 있습니다.
        };

        // 스쿼트 개수 초기화 함수
        window.resetCount = function() {
            document.getElementById('count-val').innerText = "0";
        }

        // --- 여기에 나중에 MediaPipe 공통 로직을 채워넣을 예정입니다 ---
    </script>
</body>
</html>
